name: DEV CI

on:
  push:
  pull_request:
  workflow_dispatch:
jobs: 
  BUILD: 
    uses: haidarim/ci-templates/.github/workflows/java-build-ci.yml@v1.1.10
    with:
      java-version: "21"

  TEST:
    needs: build
    uses: haidarim/ci-templates/.github/workflows/java-test-ci.yml@v1.1.10
    with:
      java-version: "21"

  JAVA-DOC:
    needs: build
    uses: haidarim/ci-templates/.github/workflows/java-jdoc-ci.yml@v1.1.10
    with:
      java-version: "21"

